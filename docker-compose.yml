version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: healthtech-redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build: .
    container_name: healthtech-backend
    ports:
      - "5001:5001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    env_file:
      - backend/.env
    depends_on:
      - redis
    restart: always
