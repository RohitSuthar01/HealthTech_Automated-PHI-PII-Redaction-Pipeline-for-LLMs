<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthTech PHI Redaction Proxy</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css" />
</head>
<body> 
  <div class="app">
    <!-- Sidebar component -->
    <app-sidebar></app-sidebar>

    <!-- Main content viewports -->
    <main class="main">
      <!-- Login View -->
      <view-login id="view-login" class="view active"></view-login>

      <!-- Proxy View -->
      <view-proxy id="view-proxy" class="view"></view-proxy>

      <!-- Pipeline View -->
      <view-pipeline id="view-pipeline" class="view"></view-pipeline>

      <!-- Vault View -->
      <view-vault id="view-vault" class="view"></view-vault>

      <!-- Audit Logs View -->
      <view-logs id="view-logs" class="view"></view-logs>

      <!-- Settings View -->
      <view-settings id="view-settings" class="view"></view-settings>
    </main>
  </div>

  <!-- Components -->
  <script src="js/components/app-sidebar.js"></script>
  <script src="js/components/view-login.js"></script>
  <script src="js/components/view-proxy.js"></script>
  <script src="js/components/view-pipeline.js"></script>
  <script src="js/components/view-vault.js"></script>
  <script src="js/components/view-logs.js"></script>
  <script src="js/components/view-settings.js"></script>

  <!-- Core Pipeline logic -->
  <script src="js/redaction.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
